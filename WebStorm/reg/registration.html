<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Авторизация</title>
  <link rel="stylesheet" href="stylization.css">
  <script src="https://kit.fontawesome.com/3d0e27e432.js"></script>
</head>
<body>

<section>

  <div class="form-box">
    <div class="form-value">
      <form action="" id="form">
        <h1 id="title">Login</h1>

        <div class="inputbox" id="name-input" style="display: none;">
          <label for="name">Name</label>
          <input type="text" id="name" required placeholder="">
          <ion-icon name="person-outline"></ion-icon>
        </div>

        <div class="inputbox">
          <label for="email">Email</label>
          <input type="email" id="email" required placeholder="">
          <ion-icon name="mail-outline"></ion-icon>
        </div>

        <div class="inputbox">
          <label for="password">Password</label>
          <input type="password" id="password" required placeholder="">
          <ion-icon name="lock-closed-outline"></ion-icon>
        </div>

        <button id="submit">Log in</button>
        <div class="register">
          <p id="register-text">Don't have an account? <a href="#" id="register-link">Register here</a></p>
        </div>
      </form>
    </div>
  </div>
</section>

<script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
<script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

<script src="script.js"></script>

</body>
</html>
