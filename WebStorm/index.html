<div class="search-box">
  <label>
    <input type="text" placeholder="Поиск" class="input">
  </label>

  <button class="filter_button">
    <i class="fas fa-filter"></i>
    Фильтры
  </button>

  <div class="search-btn">
    <i class="fas fa-search"></i>
  </div>
  <div class="cancel-btn">
    <i class="fas fa-times"></i>
  </div>
</div>

<div class="burger-menu">
  <a href="#" class="burger-menu_button">
    <span class="burger-menu_lines"></span>
  </a>

  <nav class="burger-menu_nav">
    <a href="reg/registration.html" class="burger-menu_link">Регистрация/вход</a>
    <a href="#" class="burger-menu_link">Банкомат</a>
    <a href="#" class="burger-menu_link">Инфокиоск</a>
    <a href="#" class="burger-menu_link">Ресайклер</a>
  </nav>

  <div class="burger-menu_overlay"></div>
</div>

<div class="filter">
  <div class="filter_overlay">
    <div class="filter_cancel-btn">
      <i class="fas fa-times"></i>
    </div>
  </div>

  <div class="checkbox">
    <div class="checkbox-item">
      <label>
        <span>Бесконтактное снятие наличных</span>
        <input type="checkbox" rel="n1"/>
      </label>
    </div>
    <div class="checkbox-item">
      <label>
        <span>Выдача наличных</span>
        <input type="checkbox" rel="n2"/>
      </label>
    </div>
    <div class="checkbox-item">
      <label>
        <span>Прием наличных</span>
        <input type="checkbox" rel="n3"/>
      </label>
    </div>
    <div class="checkbox-item">
      <label>
        <span>Платежи</span>
        <input type="checkbox" rel="n4"/>
      </label>
    </div>
    <div class="checkbox-item">
      <label>
        <span>Обмен валюты</span>
        <input type="checkbox" rel="n5"/>
      </label>
    </div>
  </div>
</div>
